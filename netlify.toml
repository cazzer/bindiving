[build]
  publish = ".next"
  command = "npm run build"
  edge_functions = "netlify/edge-functions"

[build.environment]
  NODE_VERSION = "24"

# Include shared prompt so functions can import from netlify/shared
[functions]
  included_files = ["netlify/shared/**"]

# Daily cleanup of shared result blobs older than 30 days
[functions."cleanup-result-blobs"]
  schedule = "0 3 * * *"

# Edge functions (run before redirects)
[[edge_functions]]
  path = "/api/stream-response"
  function = "stream-response"

[[edge_functions]]
  path = "/api/stream-search"
  function = "stream-search"

[[edge_functions]]
  path = "/api/evaluate-product"
  function = "evaluate-product"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://www.googletagmanager.com https://us.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://www.google.com https://us.i.posthog.com https://*.sentry.io https://www.google-analytics.com; frame-src https://www.google.com; font-src 'self' https://fonts.gstatic.com data:;"

# Route /api/* to Netlify Functions (needed for netlify dev and production)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200