<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bin Diving</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <img class="logo" src="icons/favicon.svg" alt="">
      <h1>Bin Diving</h1>
      <button id="redive-btn" title="Re-dive">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
    </header>

    <div id="not-amazon" class="state" style="display: none;">
      <p>Navigate to an Amazon product page to dive in.</p>
    </div>

    <div id="loading" class="state" style="display: none;">
      <div class="spinner"></div>
      <p id="status-text">Diving in...</p>
    </div>

    <div id="error" class="state" style="display: none;">
      <p id="error-text"></p>
      <button id="retry-btn">Try again</button>
    </div>

    <div id="result" class="state" style="display: none;">
      <div id="verdict-section">
        <div id="verdict-icon"></div>
        <div id="verdict-body">
          <p id="verdict-reason"></p>
          <div id="verdict-sources" style="display: none;"></div>
        </div>
      </div>

      <div id="alternatives-section" style="display: none;">
        <h2>Better options</h2>
        <div id="alternatives-list"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
