<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 120px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8e4dc;
      font-size: 13px;
      line-height: 1.5;
      background: #1a1814;
    }

    .bd-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(61, 56, 50, 0.4);
    }
    .bd-logo { width: 20px; height: 20px; filter: brightness(0) invert(1); }
    .bd-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      color: #e8e4dc;
      text-decoration: none;
    }
    .bd-title:hover { color: #2bdcd2; }

    .bd-body { padding: 16px; }
    .bd-state { display: none; }

    .bd-idle, .bd-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 0;
    }

    .bd-spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(61, 56, 50, 0.4);
      border-top-color: #2bdcd2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .bd-status-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 12px; font-style: italic; opacity: 0.5;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .bd-error { text-align: center; padding: 16px 0; }
    .bd-error-text { color: #fbbf24; margin-bottom: 12px; }

    .bd-not-product {
      text-align: center; padding: 24px 16px; opacity: 0.5;
      font-family: 'Fraunces', Georgia, serif; font-style: italic; font-size: 12px;
    }

    .bd-go-btn, .bd-retry-btn {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700; font-size: 14px;
      background: #2bdcd2; color: #0c0c0c;
      border: none; padding: 10px 24px; border-radius: 8px;
      cursor: pointer; transition: opacity 0.15s;
    }
    .bd-go-btn:hover, .bd-retry-btn:hover { opacity: 0.9; }

    .bd-result { animation: fade-in 0.3s ease-in forwards; }
    .bd-verdict {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px;
      border-radius: 10px; background: rgba(23, 23, 23, 0.5);
      border: 1px solid rgba(61, 56, 50, 0.3);
    }
    .bd-verdict-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
    .bd-verdict-body { flex: 1; min-width: 0; }
    .bd-verdict-reason { font-size: 13px; line-height: 1.5; }
    .bd-verdict-sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .bd-verdict-sources a {
      font-size: 11px; color: #2bdcd2; opacity: 0.8;
      text-decoration: underline; text-underline-offset: 0.15em; text-decoration-thickness: 1px;
    }
    .bd-verdict-sources a:hover { opacity: 1; }

    .bd-alternatives { margin-top: 16px; display: none; }
    .bd-alternatives h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px; font-weight: 700; margin-bottom: 10px;
    }
    .bd-alt-card {
      background: rgba(23, 23, 23, 0.5); border: 1px solid rgba(61, 56, 50, 0.3);
      border-radius: 10px; margin-bottom: 10px; overflow: hidden;
      display: flex; flex-direction: column; animation: fade-in 0.3s ease-in forwards;
    }
    .bd-alt-card img {
      width: 100%; height: 120px; object-fit: contain;
      background: #252220; border-bottom: 1px solid rgba(61, 56, 50, 0.4);
    }
    .bd-img-placeholder {
      width: 100%; height: 120px; background: #252220;
      border-bottom: 1px solid rgba(61, 56, 50, 0.4);
    }
    .bd-alt-info { padding: 12px; }
    .bd-alt-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px; font-weight: 700; margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .bd-alt-name a { color: inherit; text-decoration: underline; text-underline-offset: 0.15em; text-decoration-thickness: 1.5px; }
    .bd-alt-name a:hover { color: #2bdcd2; }
    .bd-alt-price { font-size: 12px; color: #2bdcd2; font-weight: 800; margin-bottom: 4px; }
    .bd-alt-pros, .bd-alt-cons { font-size: 11px; line-height: 1.6; opacity: 0.8; }
    .bd-alt-pros .bd-icon { color: #34d399; }
    .bd-alt-cons .bd-icon { color: #fbbf24; }
    .bd-label { font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
    .bd-alt-pros .bd-label { color: #34d399; }
    .bd-alt-cons .bd-label { color: #fbbf24; }
    .bd-amazon-link {
      display: inline-block; margin-top: 8px;
      font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-size: 11px;
      color: #0c0c0c; background: #2bdcd2; border-radius: 8px; padding: 5px 12px;
      text-decoration: none; transition: opacity 0.15s;
    }
    .bd-amazon-link:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="bd-header">
    <img class="bd-logo" src="icons/favicon.svg" alt="">
    <a class="bd-title" href="https://bindiving.com" target="_blank" rel="noopener">Bin Diving</a>
  </div>
  <div class="bd-body">
    <div class="bd-state bd-loading" style="display:flex">
      <div class="bd-spinner"></div>
      <p class="bd-status-text">Diving in...</p>
    </div>
    <div class="bd-state bd-not-product">
      Navigate to an Amazon product page to dive in.
    </div>
    <div class="bd-state bd-error">
      <p class="bd-error-text"></p>
      <button class="bd-retry-btn">Try again</button>
    </div>
    <div class="bd-state bd-result">
      <div class="bd-verdict">
        <div class="bd-verdict-icon"></div>
        <div class="bd-verdict-body">
          <p class="bd-verdict-reason"></p>
          <div class="bd-verdict-sources"></div>
        </div>
      </div>
      <div class="bd-alternatives">
        <h2>Better options</h2>
        <div class="bd-alt-list"></div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
